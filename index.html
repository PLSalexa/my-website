<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: #5A0F1C;
      font-family: 'Cinzel', serif;
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      color: #FFFFF0;
      font-size: 48px;
      text-align: center;
      margin-top: 40px;
    }

    img {
      width: 560px;
      position: absolute;
      top: 100px;
      left: -300px;

      animation: drive 6s linear infinite;
    }

    @keyframes drive {
      from {
        left: -300px;
      }
      to {
        left: 110%;
      }
    }
  </style>
</head>

<body>

  <h1>Royal E-Car Tours</h1>

  <img src="car.png" alt="Car">

</body>
</html>
